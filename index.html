<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet"  type="text/css" href="css/style.css">
</head>

<body>

    <header id="header">
        <h1 id="title">Just do it.</h1>
        <div id="border"></div>
    </header>

    <section id="form">
        <form id="todo-form">
            <input id="todo-input" class="todo-input" type="text" placeholder="Add a task">
            <button class="todo-btn" type="submit">Add</button>
        </form>
    </section>

    <section id="datetime-container">
        <p><span id="datetime"></span></p>
    </section>

    <section id="myUnOrdList">
        <ul class="todo-list">
        </ul>
    </section>

    <script src="js/app.js"></script>

</body>
</html>
